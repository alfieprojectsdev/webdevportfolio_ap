name: Build LaTeX CV

on:
  push:
    branches:
      - main
    paths:
      - 'cv/**'
      - '.github/workflows/build-cv.yml'
  pull_request:
    paths:
      - 'cv/**'
  workflow_dispatch:  # Allow manual triggers

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LaTeX dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra

      - name: Compile LaTeX CV
        run: |
          cd cv
          make build

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: cv-pdf
          path: docs/AlfiePelicano_CV_2025.pdf
          retention-days: 90

      - name: Commit and push PDF (if on main branch)
        if: github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/AlfiePelicano_CV_2025.pdf
          git diff --staged --quiet || git commit -m "chore: auto-update CV PDF [skip ci]"
          git push
